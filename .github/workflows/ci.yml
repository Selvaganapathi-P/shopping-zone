name: Thansel Zovia CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Frontend build + lint ──
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        run: npm run build
        env:
          CI: false
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: build/
          retention-days: 7

  # ── Backend lint + syntax check ──
  backend:
    name: Backend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecommerce-expense-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ecommerce-expense-backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Syntax check all JS files
        run: node --check index.js && node --check app.js

      - name: Check controller syntax
        run: |
          for f in controller/*.js; do node --check "$f" && echo "✓ $f"; done

      - name: Check router syntax
        run: |
          for f in router/*.js; do node --check "$f" && echo "✓ $f"; done

  # ── Security audit ──
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high || true

      - name: Audit backend dependencies
        run: |
          cd ecommerce-expense-backend
          npm audit --audit-level=high || true
